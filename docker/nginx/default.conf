server {
    listen 80;
    server_name _;
    root /var/www/html/public;
    index index.php index.html;

    client_max_body_size 25m;

    gzip on;
    gzip_vary on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        application/javascript
        application/json
        application/wasm
        image/svg+xml
        text/css
        text/javascript
        text/plain
        text/xml;

    # Telegram Web App SPA — static build output of resources/twa.
    # The inner Vue Router runs in history mode; unknown paths under /twa/
    # fall back to index.html so deep links like /twa/training/123 work.
    location /twa/ {
        alias /var/www/html/public/twa/;
        try_files $uri $uri/ /twa/index.html;

        # index.html must always be re-fetched to pick up new asset hashes.
        location = /twa/index.html {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
        }
        # Hashed assets can be cached forever.
        location ~ ^/twa/assets/ {
            add_header Cache-Control "public, max-age=31536000, immutable";
        }
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}
