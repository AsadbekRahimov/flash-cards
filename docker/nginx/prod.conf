# Production Nginx config for LexiFlow Pro.
# Expects APP_DOMAIN env var injected via `envsubst` at container start
# (see docker-compose.prod.yml nginx service command).

# Redirect all HTTP → HTTPS, except ACME HTTP-01 challenge.
server {
    listen 80;
    server_name ${APP_DOMAIN};

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    http2 on;
    server_name ${APP_DOMAIN};

    ssl_certificate     /etc/letsencrypt/live/${APP_DOMAIN}/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/${APP_DOMAIN}/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/${APP_DOMAIN}/chain.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_stapling on;
    ssl_stapling_verify on;

    root /var/www/html/public;
    index index.php index.html;

    client_max_body_size 25m;

    gzip on;
    gzip_vary on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        application/javascript
        application/json
        application/wasm
        image/svg+xml
        text/css
        text/javascript
        text/plain
        text/xml;

    # HSTS is also set by Laravel SecurityHeaders middleware; duplicating here
    # guarantees it even for nginx-served static files (/twa/ assets).
    add_header Strict-Transport-Security "max-age=15552000; includeSubDomains" always;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location /twa/ {
        alias /var/www/html/public/twa/;
        try_files $uri $uri/ /twa/index.html;

        location = /twa/index.html {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
        }
        location ~ ^/twa/assets/ {
            add_header Cache-Control "public, max-age=31536000, immutable";
        }
    }

    # Livewire serves admin-panel browser assets and update endpoints through
    # hash-prefixed Laravel routes like /livewire-<hash>/livewire.min.js.
    # Keep these dynamic routes away from generic static *.js handlers.
    location ^~ /livewire- {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        fastcgi_param HTTPS on;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}
