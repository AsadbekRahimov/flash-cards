name: CI

on:
    push:
        branches: [master, main, develop]
    pull_request:
        branches: [master, main, develop]

jobs:
    quality:
        name: Lint & Static analysis
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Setup PHP
              uses: shivammathur/setup-php@v2
              with:
                  php-version: '8.3'
                  extensions: mbstring, intl, bcmath, pdo_pgsql, redis, zip
                  coverage: none
                  tools: composer:v2

            - name: Cache Composer packages
              uses: actions/cache@v4
              with:
                  path: vendor
                  key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
                  restore-keys: ${{ runner.os }}-composer-

            - name: Install dependencies
              run: composer install --prefer-dist --no-interaction --no-progress

            - name: Pint (code style)
              run: ./vendor/bin/pint --test

            - name: PHPStan (larastan)
              run: ./vendor/bin/phpstan analyse --no-progress --memory-limit=1G

    test:
        name: Pest
        runs-on: ubuntu-latest
        services:
            postgres:
                image: postgres:16-alpine
                env:
                    POSTGRES_DB: lexiflow
                    POSTGRES_USER: lexiflow
                    POSTGRES_PASSWORD: secret
                ports:
                    - 5432:5432
                options: >-
                    --health-cmd "pg_isready -U lexiflow"
                    --health-interval 5s
                    --health-timeout 3s
                    --health-retries 10

            redis:
                image: redis:7-alpine
                ports:
                    - 6379:6379
                options: >-
                    --health-cmd "redis-cli ping"
                    --health-interval 5s
                    --health-timeout 3s
                    --health-retries 10

        env:
            DB_CONNECTION: pgsql
            DB_HOST: 127.0.0.1
            DB_PORT: 5432
            DB_DATABASE: lexiflow
            DB_USERNAME: lexiflow
            DB_PASSWORD: secret
            REDIS_HOST: 127.0.0.1
            REDIS_PORT: 6379
            CACHE_STORE: redis
            QUEUE_CONNECTION: sync
            SESSION_DRIVER: array

        steps:
            - uses: actions/checkout@v4

            - name: Setup PHP
              uses: shivammathur/setup-php@v2
              with:
                  php-version: '8.3'
                  extensions: mbstring, intl, bcmath, pdo_pgsql, redis, zip
                  coverage: none
                  tools: composer:v2

            - name: Cache Composer packages
              uses: actions/cache@v4
              with:
                  path: vendor
                  key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
                  restore-keys: ${{ runner.os }}-composer-

            - name: Install dependencies
              run: composer install --prefer-dist --no-interaction --no-progress

            - name: Prepare .env
              run: |
                  cp .env.example .env
                  php artisan key:generate

            - name: Run migrations
              run: php artisan migrate --force

            - name: Run Pest
              run: ./vendor/bin/pest

    build:
        name: Build assets
        runs-on: ubuntu-latest
        needs: [quality, test]
        steps:
            - uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: '20.19'
                  cache: npm
                  cache-dependency-path: |
                      package-lock.json
                      resources/twa/package-lock.json

            - name: Install root frontend dependencies
              run: npm ci

            - name: Build Laravel assets
              run: npm run build

            - name: Install TWA dependencies
              run: npm ci --prefix resources/twa

            - name: Build TWA assets
              run: npm run build --prefix resources/twa

            - name: Upload Laravel build artifacts
              uses: actions/upload-artifact@v4
              with:
                  name: laravel-build
                  path: public/build/
                  retention-days: 7

            - name: Upload TWA build artifacts
              uses: actions/upload-artifact@v4
              with:
                  name: twa-build
                  path: public/twa/
                  retention-days: 7

    deploy:
        name: Deploy
        runs-on: ubuntu-latest
        needs: build
        if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
        environment: LexiFlow
        steps:
            - name: Deploy via SSH
              uses: appleboy/ssh-action@v1.0.3
              with:
                  host: ${{ secrets.SSH_HOST }}
                  username: ${{ secrets.SSH_USER }}
                  password: ${{ secrets.SSH_PASSWORD }}
                  script: cd /var/www/lexiflow && yes | bash /usr/local/bin/deploy.sh
